# DEMO — unrestricted, for the REAL DoorDash stop-before-pay walkthrough.
# No dietary/allergy restrictions, so real (unverifiable) DoorDash items are not
# safety-gated and a real dish can reach AUTO -> add to cart -> stop before pay.
# (With restrictions set, real DoorDash items are verified_safe=False and the
# engine BLOCKs them — which is the correct, safety-first behavior, but not what
# you want to show for the place-order walkthrough.)
budget:
  daily_max_usd: 80
  auto_approve_under_usd: 80
# Demo convenience: auto-clear a leftover cart so the walkthrough is smooth. This
# is the user's explicit opt-in (a real config leaves it off and fails closed on a
# non-empty cart rather than wiping it).
clear_cart: true
preferences:
  cuisines: [Thai]
  # Pin the live walkthrough to a known-good store. discover() uses the first
  # favorite as its search query, so the demo lands on the SAME restaurant whose
  # add-to-cart flow is verified (radio-only modals), instead of a random Thai
  # store each run (some have modal layouts the unattended add can't complete).
  favorite_restaurants: ["Thaibodia Bistro"]
notifications:
  channel: "discord"
  confirmation_timeout_minutes: 20
