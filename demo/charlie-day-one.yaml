# DEMO — Charlie, Day One.
# auto_approve_under: 0  => the agent confirms EVERY order until trust is granted
# (the deliberate safe-by-default). Demonstrates the CONFIRM band / trust dial.
schedule:
  order_time: "12:30"
  timezone: "America/Los_Angeles"
budget:
  daily_max_usd: 25
  auto_approve_under_usd: 0          # day one: confirm everything
  rolling_cap_usd: 150
  rolling_window_days: 7
preferences:
  cuisines: [Japanese, Thai, Chinese]
  favorite_restaurants: ["Fuhuihua"]
restrictions:
  dietary: [vegetarian]
  allergies: [peanuts]
  never_order: ["KFC"]
fallback:
  restaurant: "Chipotle"             # pre-vetted: safe + cheap
notifications:
  channel: "discord"
  confirmation_timeout_minutes: 20
