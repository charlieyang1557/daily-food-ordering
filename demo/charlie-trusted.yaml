# DEMO — Charlie, after granting trust.
# auto_approve_under raised to 18 => routine in-budget orders go through silently
# (AUTO). Same restrictions + fallback as day one. Used for the AUTO / over-budget
# / allergy-fallback demos (vary the mock --scenario).
schedule:
  order_time: "12:30"
  timezone: "America/Los_Angeles"
budget:
  daily_max_usd: 25
  auto_approve_under_usd: 18         # trust granted: <=18 auto-orders
  rolling_cap_usd: 150
  rolling_window_days: 7
preferences:
  cuisines: [Japanese, Thai, Chinese]
  favorite_restaurants: ["Fuhuihua"]
restrictions:
  dietary: [vegetarian]
  allergies: [peanuts]
  never_order: ["KFC"]
fallback:
  restaurant: "Chipotle"
notifications:
  channel: "discord"
  confirmation_timeout_minutes: 20
